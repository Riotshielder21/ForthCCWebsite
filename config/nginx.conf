upstream fcc_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name fccwebsite.gg-edi.co.uk www.fccwebsite.gg-edi.co.uk;
    
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fccwebsite.gg-edi.co.uk www.fccwebsite.gg-edi.co.uk;
    
    ssl_certificate /etc/letsencrypt/live/fccwebsite.gg-edi.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fccwebsite.gg-edi.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript text/javascript application/json;
    gzip_min_length 1000;
    
    # Logging
    access_log /var/log/nginx/fcc_access.log;
    error_log /var/log/nginx/fcc_error.log;
    
    location / {
        proxy_pass http://fcc_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://fcc_backend/health;
        access_log off;
    }
}
